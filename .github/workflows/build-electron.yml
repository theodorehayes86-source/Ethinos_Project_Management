name: Build PMT Timer Widget

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Windows — builds on Windows runner, produces NSIS .exe
  # ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: artifacts/pmt-timer-widget

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Remove Windows platform exclusions from workspace overrides
        working-directory: .
        shell: bash
        run: |
          node -e "
          const fs = require('fs');
          const lines = fs.readFileSync('pnpm-workspace.yaml', 'utf8').split('\n');
          const filtered = lines.filter(l => !l.includes('win32'));
          fs.writeFileSync('pnpm-workspace.yaml', filtered.join('\n'));
          console.log('Removed win32 exclusions from pnpm-workspace.yaml');
          "

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VER}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"

      - name: Install Electron + builder
        run: pnpm add -D electron electron-builder

      - name: Build Vite renderer
        run: pnpm build:electron

      - name: Package Windows installer
        run: pnpm electron-builder --config electron-builder.json --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PMT-Timer-Widget-Windows
          path: artifacts/pmt-timer-widget/dist-electron/*.exe
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/pmt-timer-widget/dist-electron/*.exe
          name: PMT Timer Widget ${{ github.ref_name }}
          body: |
            ## PMT Timer Widget — Desktop App

            Download the installer for your platform below.

            ---

            ### Windows (.exe)
            1. Download **PMT Timer Widget Setup.exe**
            2. Run it — Windows SmartScreen may show a warning the first time; click **More info → Run anyway**
            3. The app installs silently and adds a Start Menu + Desktop shortcut
            4. Allow internet access if Windows Firewall asks (needed for Firebase sync)

            ### Mac (.dmg)
            1. Download **PMT Timer Widget.dmg**
            2. Open it and drag the app to your Applications folder
            3. **First launch:** right-click the app → **Open** → click **Open** in the dialog (required once as the app is unsigned)
            4. Allow internet access in macOS Privacy & Security if prompted

            ---

            ### What's included
            - Always-on-top floating timer (Windows 10/11, macOS 12 Monterey and later)
            - Universal Mac binary — works on both Intel and Apple Silicon Macs
            - Mini clock view — click **–** to shrink to a slim floating bar; click restore to expand
            - Firebase sync every 10 seconds; offline queue when disconnected
            - Same login credentials as the main PMT web app
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────
  # Mac — universal binary (Intel x64 + Apple Silicon arm64 in one DMG)
  # ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-14
    permissions:
      contents: write
    defaults:
      run:
        working-directory: artifacts/pmt-timer-widget

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Remove macOS platform exclusions from workspace overrides
        working-directory: .
        run: |
          node -e "
          const fs = require('fs');
          const lines = fs.readFileSync('pnpm-workspace.yaml', 'utf8').split('\n');
          const filtered = lines.filter(l => !l.includes('darwin'));
          fs.writeFileSync('pnpm-workspace.yaml', filtered.join('\n'));
          console.log('Removed darwin exclusions from pnpm-workspace.yaml');
          "

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --no-frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${VER}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"

      - name: Install Electron + builder
        run: pnpm add -D electron electron-builder

      - name: Build Vite renderer (universal)
        run: pnpm build:electron

      - name: Package Mac universal DMG
        run: pnpm electron-builder --config electron-builder.json --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_TEAM_ID: ""

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: PMT-Timer-Widget-Mac
          path: artifacts/pmt-timer-widget/dist-electron/*.dmg
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/pmt-timer-widget/dist-electron/*.dmg
          name: PMT Timer Widget ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
