kind = "web"
previewPath = "/"
title = "Consulting Tracker PMT"
version = "1.0.0"
id = "artifacts/pmt-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23188

[services.development]
run = "pnpm --filter @workspace/pmt-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pmt-app", "run", "build" ]
publicDir = "artifacts/pmt-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23188"
BASE_PATH = "/"
